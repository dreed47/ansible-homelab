---
- name: Full Update Proxmox Server with Automatic Reboot
  hosts: proxmox_servers
  become: yes
  gather_facts: yes
  serial: 1

  tasks:
    - name: Check current Proxmox version before update
      command: pveversion
      register: pve_version_before
      changed_when: false

    - name: Display current Proxmox version
      debug:
        msg: "Current Proxmox version: {{ pve_version_before.stdout }}"

    - name: Update package cache and perform full dist-upgrade
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600
      register: apt_result

    - name: Show upgrade summary
      debug:
        msg: |
          ====================================
          UPGRADE COMPLETED
          ====================================
          Packages upgraded: {{ apt_result.changed | default(false) }}

    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Display reboot status
      debug:
        msg: |
          ====================================
          REBOOT REQUIRED
          ====================================
          System will reboot in 30 seconds
      when: reboot_required_file.stat.exists

    - name: Display no reboot needed
      debug:
        msg: |
          ====================================
          NO REBOOT REQUIRED
          ====================================
          System is up to date and running latest kernel
      when: not reboot_required_file.stat.exists

    - name: Get current kernel version before reboot
      command: uname -r
      register: kernel_before
      changed_when: false
      when: reboot_required_file.stat.exists

    - name: Display kernel version before reboot
      debug:
        msg: "Kernel before reboot: {{ kernel_before.stdout }}"
      when: reboot_required_file.stat.exists

    - name: Reboot the system if required
      reboot:
        reboot_timeout: 600
        pre_reboot_delay: 30
        post_reboot_delay: 60
        reboot_timeout_sec: 600
        connect_timeout: 60
        pre_reboot_message: "System is rebooting due to kernel or critical updates"
      when: reboot_required_file.stat.exists
      register: reboot_result

    - name: Wait for system to come back online
      wait_for_connection:
        delay: 10
        timeout: 300
      when: reboot_required_file.stat.exists and reboot_result is defined and reboot_result.changed

    - name: Get kernel version after reboot
      command: uname -r
      register: kernel_after
      changed_when: false
      when: reboot_required_file.stat.exists and reboot_result is defined and reboot_result.changed

    - name: Display kernel version after reboot
      debug:
        msg: "Kernel after reboot: {{ kernel_after.stdout }}"
      when: reboot_required_file.stat.exists and kernel_after is defined

    - name: Check Proxmox version after update
      command: pveversion
      register: pve_version_after
      changed_when: false
      when: reboot_required_file.stat.exists

    - name: Display Proxmox version after reboot
      debug:
        msg: "Proxmox version after reboot: {{ pve_version_after.stdout }}"
      when: reboot_required_file.stat.exists and pve_version_after is defined

    - name: Final summary
      debug:
        msg: |
          ====================================
          UPDATE SUMMARY FOR {{ inventory_hostname }}
          ====================================
          Before: {{ pve_version_before.stdout }}
          After:  {{ pve_version_after.stdout | default(pve_version_before.stdout) }}
          Packages upgraded: {{ apt_result.changed | default(false) }}
          Reboot required: {{ 'YES' if reboot_required_file.stat.exists else 'NO' }}
          {% if reboot_required_file.stat.exists and reboot_result is defined %}
          Reboot status: SUCCESSFUL
          Kernel: {{ kernel_before.stdout }} → {{ kernel_after.stdout }}
          {% endif %}
          ====================================
